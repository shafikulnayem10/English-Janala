<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English-Janala | Login</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- Tailwind & DaisyUI -->
     
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" /> -->

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="./style/style.css">

</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto font-[Outfit] flex items-center justify-center">

    <div class="w-full px-6">

       <!-- Logo Section -->
<div class="text-center mb-10">
    <img src="./assets/logo.png" alt="English Janala Logo" class="w-20 h-20 mx-auto mb-4" />
  <h1 class="text-3xl font-bold mt-6">Welcome to English-Janala</h1>
  <p class="text-gray-500 text-sm mt-2">Learn English Smartly & Easily</p>

</div>

        <!-- Login Card -->
        <div class="card bg-base-100 shadow-2xl">
            <div class="card-body">

                <fieldset class="fieldset">

                    <label class="label font-semibold">Email Address</label>
                    <input 
                        id="input-email" 
                        type="email"
                        class="input rounded-full bg-base-200"
                        placeholder="Enter your email address" 
                        required
                        value="dummy@gmail.com"
                    />

                    <br>

                    <label class="label font-semibold">Password</label>
                    <input 
                        id="input-password" 
                        type="password" 
                        class="input rounded-full bg-base-200"
                        placeholder="Enter your password"
                        value="123456"
                        required
                    />

                    <button id="login-btn" class="btn btn-primary mt-6 rounded-full">
                        Login
                    </button>

                  
                </fieldset>

            </div>
        </div>

    </div>

    <script src="./scripts/login.js"></script>

</body>
</html>
